# WeasyPrint system libraries for Railway / Nixpacks
[phases.setup]
nixPkgs = [
  "python312",
  "cairo",
  "pango",
  "gdk-pixbuf",
  "libffi",
  "fontconfig",
  "freetype",
  "harfbuzz",
  "glib",
  "shared-mime-info",
]
aptPkgs = [
  "libcairo2",
  "libpango-1.0-0",
  "libpangocairo-1.0-0",
  "libgdk-pixbuf2.0-0",
  "libffi-dev",
  "libglib2.0-0",
  "shared-mime-info",
  "fonts-liberation",
  "fonts-dejavu-core",
]

[phases.install]
cmds = [
  "pip install -r requirements.txt",
  "python -m playwright install --with-deps chromium",
]
